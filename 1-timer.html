<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <script type="module" crossorigin src="/goit-advancedjs-hw-02/1-timer.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/vendor-BBBav85I.js">
    <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-02/assets/vendor-CasrsQQk.css">
    <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-02/assets/styles-DnQOfF_9.css">
  </head>
  <body>
    <main>
      <div class="container">
        <h1 class="main-title page-title">Timer</h1>
        <a class="back-link" href="./index.html">Go back</a>

      </div>

      <div class="timer-controls">
        <input type="text" class="datepickr-input" id="datetime-picker" />
        <button type="button" class="start-btn" data-start disabled>
          Start
        </button>
      </div>
      <div class="timer">
        <div class="field">
          <span class="value" data-days>00</span>
          <span class="label">Days</span>
        </div>
        <div class="field">
          <span class="value" data-hours>00</span>
          <span class="label">Hours</span>
        </div>
        <div class="field">
          <span class="value" data-minutes>00</span>
          <span class="label">Minutes</span>
        </div>
        <div class="field">
          <span class="value" data-seconds>00</span>
          <span class="label">Seconds</span>
        </div>
      </div>
    </main>

  </body>
</html>
